<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050509;
    --ink:#e9e9f2;
    --dim:#8a8a9c;
    --accent-blue:#4f7fe0;
    --accent-amber:#e0a458;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    color:var(--ink);
    font-family:'Space Grotesk',sans-serif;
    overflow-x:hidden;
  }
  #stars{
    position:fixed;
    inset:0;
    z-index:0;
  }
  .nebula{
    position:fixed;
    inset:-15%;
    z-index:0;
    background:
      radial-gradient(ellipse 55% 40% at 25% 15%, rgba(255,255,255,0.14), transparent 60%),
      radial-gradient(ellipse 60% 45% at 78% 30%, rgba(200,200,220,0.13), transparent 65%),
      radial-gradient(ellipse 65% 50% at 20% 70%, rgba(180,180,210,0.16), transparent 65%),
      radial-gradient(ellipse 70% 55% at 70% 80%, rgba(255,255,255,0.12), transparent 65%),
      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(110,90,180,0.22), transparent 70%),
      radial-gradient(ellipse 90% 70% at 50% 100%, rgba(10,10,18,0.85), transparent 75%);
    filter:blur(24px);
    animation: drift 40s ease-in-out infinite alternate;
  }
  .nebula-2{
    position:fixed;
    inset:-20%;
    z-index:0;
    background:
      radial-gradient(ellipse 50% 40% at 60% 20%, rgba(120,140,255,0.16), transparent 60%),
      radial-gradient(ellipse 55% 45% at 30% 60%, rgba(255,255,255,0.10), transparent 65%),
      radial-gradient(ellipse 60% 50% at 80% 75%, rgba(160,100,220,0.15), transparent 65%);
    filter:blur(32px);
    mix-blend-mode:screen;
    animation: drift2 55s ease-in-out infinite alternate;
  }
  .vignette{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background: radial-gradient(ellipse 80% 70% at 50% 45%, transparent 40%, rgba(0,0,0,0.55) 100%);
  }
  @keyframes drift{
    0%{ transform:translate(0,0) scale(1); }
    100%{ transform:translate(-3%,2%) scale(1.06); }
  }
  @keyframes drift2{
    0%{ transform:translate(0,0) scale(1.02) rotate(0deg); }
    100%{ transform:translate(3%,-2%) scale(1.1) rotate(2deg); }
  }
  #loader{
    position:fixed;
    inset:0;
    z-index:50;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    cursor:pointer;
    transition:opacity .5s ease, visibility .5s ease;
  }
  #loader.hidden{ opacity:0; visibility:hidden; pointer-events:none; }
  .loader-ring{
    width:44px;
    height:44px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.12);
    border-top-color:var(--accent-blue);
    animation:rotate 0.9s linear infinite;
  }
  @keyframes rotate{ to{ transform:rotate(360deg); } }
  .loader-text{
    font-family:'Space Grotesk',sans-serif;
    font-size:1.4rem;
    font-weight:700;
    letter-spacing:1px;
    color:var(--ink);
  }
  .pixel-cat{
    position:fixed;
    bottom:0;
    left:0;
    z-index:6;
    width:36px;
    height:24px;
    transform-origin:center bottom;
    pointer-events:none;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.6));
  }
  .pixel-cat.walking{ animation: catBob 0.35s steps(2) infinite; }
  @keyframes catBob{
    0%{ transform:translateY(0); }
    50%{ transform:translateY(-2px); }
    100%{ transform:translateY(0); }
  }
  .cat-px{
    position:absolute;
    width:4px;
    height:4px;
    background:transparent;
  }
  main{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 20px 28px;
    text-align:center;
  }
  .avatar-wrap{
    position:relative;
    width:108px;
    height:108px;
    margin-bottom:16px;
  }
  .avatar{
    width:100%;
    height:100%;
    border-radius:50%;
    background:linear-gradient(160deg,#23233a,#0c0c16);
    border:2px solid rgba(255,255,255,0.14);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 30px rgba(90,110,220,0.18);
    overflow:hidden;
  }
  .avatar svg{ width:44px; height:44px; stroke:var(--dim); }
  .avatar img{ width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .status-dot{
    position:absolute;
    right:4px;
    bottom:4px;
    width:18px;
    height:18px;
    border-radius:50%;
    background:var(--accent-blue);
    border:3px solid var(--bg);
    box-shadow:0 0 8px rgba(79,127,224,0.8);
  }
  .name{
    font-size:1.8rem;
    font-weight:700;
    letter-spacing:0.5px;
    margin:0 0 10px;
  }
  .icon-row{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:16px;
  }
  .icon-row svg{
    width:26px;
    height:26px;
    stroke:var(--ink);
    fill:none;
    stroke-width:1.6;
  }
  .icon-row > *{
    animation: iconGlow 2.1s ease-in-out infinite;
  }
  .icon-row > *:nth-child(1){ animation-delay: 0s; }
  .icon-row > *:nth-child(2){ animation-delay: 0.9s; }
  @keyframes iconGlow{
    0%, 76%, 100%{
      filter: drop-shadow(0 0 0px rgba(224,164,88,0));
    }
    12%{
      filter:
        drop-shadow(0 0 6px var(--accent-amber))
        drop-shadow(0 0 14px var(--accent-amber));
    }
  }
  .status-line{
    font-family:'JetBrains Mono',monospace;
    font-size:0.9rem;
    color:var(--dim);
    margin-bottom:26px;
    display:flex;
    align-items:center;
    gap:2px;
  }
  .caret{
    display:inline-block;
    width:2px;
    height:1.1em;
    background:var(--accent-amber);
    margin-left:4px;
    animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }
  .social-row{
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:10px;
  }
  .social-link{
    width:34px;
    height:34px;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    text-decoration:none;
    position:relative;
    transition:background .2s ease, transform .15s ease;
  }
  .social-link:hover{ background:rgba(255,255,255,0.1); transform:translateY(-2px); }
  .social-link svg{ width:16px; height:16px; stroke:var(--ink); fill:none; stroke-width:1.7; }
  #yt{
    position:fixed;
    width:1px;
    height:1px;
    opacity:0;
    pointer-events:none;
  }
  @media (max-width:400px){
    .name{ font-size:1.6rem; }
    .avatar-wrap{ width:92px; height:92px; }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">:3</div>
</div>

<canvas id="stars"></canvas>
<div class="nebula"></div>
<div class="nebula-2"></div>
<div class="vignette"></div>
<div class="pixel-cat" id="pixelCat"><div class="cat-px" id="catPixels"></div></div>

<main>
  <div class="avatar-wrap">
    <div class="avatar" id="avatar">
      <svg viewBox="0 0 24 24" fill="none"><path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M12 12a4 4 0 100-8 4 4 0 000 8zM4 20c0-3.6 3.6-6 8-6s8 2.4 8 6"/></svg>
    </div>
    <div class="status-dot"></div>
  </div>

  <h1 class="name" id="displayName">&nbsp;</h1>

  <div class="icon-row">
    <svg viewBox="0 0 24 24" fill="none">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 20.5s-7.8-4.7-9.6-9.4C1.4 7.9 3.4 4.8 6.6 4.6c2-.1 3.6 1 4.4 2.4.8-1.4 2.4-2.5 4.4-2.4 3.2.2 5.2 3.3 4.2 6.5C17.8 15.8 12 20.5 12 20.5z"/>
      <text x="12" y="13.6" text-anchor="middle" font-size="7" fill="var(--ink)" stroke="none" font-family="'Noto Sans','Noto Sans Devanagari',sans-serif">ॐ</text>
    </svg>
    <svg viewBox="0 0 24 24" fill="none">
      <path stroke-linecap="round" stroke-linejoin="round" d="M2.2 15.6l4-3.3"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M6.2 12.3h10.8"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M17 12.1l5-.7"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M13 10.5l7-.9"/>
      <path stroke-linecap="round" d="M21.3 11v-1.5"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M7.1 12.6l-.9 3.4"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.6 12.7c-.4 1-.2 2.1.9 2.4"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.4 12.8c-1.7 1.6-2 4.5-.3 6.5 1.8-1 2.8-2.7 2.6-4.7"/>
    </svg>
  </div>

  <div class="status-line">yo<span class="caret"></span></div>

  <div class="social-row">
    <a class="social-link" href="https://discord.com/users/1418597263479144471" target="_blank" rel="noopener" title="Discord">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 8.5c2.6-1 5.4-1 8 0M7 15.5c2.9 1.2 7.1 1.2 10 0M8.5 13.2c-3.3-.4-4.8-1.8-4.8-1.8s.8-5.2 3.3-6.6c1-.6 2.2-.9 2.2-.9l.6 1.2M15.5 13.2c3.3-.4 4.8-1.8 4.8-1.8s-.8-5.2-3.3-6.6c-1-.6-2.2-.9-2.2-.9l-.6 1.2M9 13.4a1 1 0 100-2 1 1 0 000 2zM15 13.4a1 1 0 100-2 1 1 0 000 2z"/></svg>
    </a>
    <a class="social-link" href="https://kitty-ai-eight.vercel.app/" target="_blank" rel="noopener" title="Kitty AI">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 10.5V8.2L3.5 6.4l1-2.6L7 5.2l1.6-2.4h2.8L13 5.2l2.5-1.4 1 2.6L14 8.2v2.3"/><path stroke-linecap="round" stroke-linejoin="round" d="M6 10.5c0-1.4 1.2-2.3 2.7-2.3h6.6c1.5 0 2.7.9 2.7 2.3v4.2c0 3-2.6 5.4-6 5.4s-6-2.4-6-5.4v-4.2z"/><path stroke-linecap="round" d="M9.6 13.4v1M14.4 13.4v1"/></svg>

</main>

<div id="yt"></div>

<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let w,h,stars=[],motes=[],shooting=null;
function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
  const count = Math.floor((w*h)/5500);
  stars = Array.from({length:count},()=>({
    x:Math.random()*w,
    y:Math.random()*h,
    r:Math.random()*1.6+0.3,
    p:Math.random()*Math.PI*2,
    s:Math.random()*0.02+0.006
  }));
  const moteCount = Math.floor((w*h)/28000);
  motes = Array.from({length:moteCount},()=>({
    x:Math.random()*w,
    y:Math.random()*h,
    r:Math.random()*1.8+0.6,
    vy:Math.random()*0.25+0.08,
    vx:(Math.random()-0.5)*0.15,
    a:Math.random()*0.4+0.15
  }));
}
function maybeSpawnShootingStar(){
  if(!shooting && Math.random() < 0.0025){
    const startX = Math.random()*w*0.6;
    shooting = { x:startX, y: -10, vx:6, vy:3.2, life:1 };
  }
}
function draw(){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#fff';
  for(const st of stars){
    st.p += st.s;
    const a = 0.4 + Math.sin(st.p)*0.4 + 0.35;
    ctx.globalAlpha = Math.max(0,Math.min(1,a));
    ctx.beginPath();
    ctx.arc(st.x, st.y, st.r, 0, Math.PI*2);
    ctx.fill();
  }
  for(const m of motes){
    m.y -= m.vy;
    m.x += m.vx;
    if(m.y < -5){ m.y = h+5; m.x = Math.random()*w; }
    ctx.globalAlpha = m.a;
    ctx.fillStyle = 'rgba(224,164,88,0.9)';
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
    ctx.fill();
  }
  maybeSpawnShootingStar();
  if(shooting){
    const s = shooting;
    ctx.globalAlpha = s.life;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - s.vx*8, s.y - s.vy*8);
    ctx.stroke();
    s.x += s.vx; s.y += s.vy; s.life -= 0.012;
    if(s.life <= 0 || s.x > w+20 || s.y > h+20) shooting = null;
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(draw);
}
window.addEventListener('resize', resize);
resize();
draw();

(function(){
  const CAT_ROWS = [
    "..##.##..",
    ".#######.",
    ".#E###E#.",
    ".#######.",
    "..#####..",
    "...###..."
  ];
  const catEl = document.getElementById('catPixels');
  const px = 4;
  let shadow = [];
  CAT_ROWS.forEach((row,y)=>{
    [...row].forEach((ch,x)=>{
      if(ch === '#') shadow.push(`${x*px}px ${y*px}px 0 0 #2b2b38`);
      if(ch === 'E') shadow.push(`${x*px}px ${y*px}px 0 0 #e0a458`);
    });
  });
  catEl.style.boxShadow = shadow.join(',');

  const wrap = document.getElementById('pixelCat');
  let x = window.innerWidth * 0.5;
  let targetX = x;
  let facing = 1;
  wrap.style.bottom = '18px';

  function pickTarget(){
    targetX = Math.random() * (window.innerWidth - 40);
  }
  pickTarget();
  setInterval(pickTarget, 4000 + Math.random()*3000);

  function step(){
    const dx = targetX - x;
    if(Math.abs(dx) > 2){
      const dir = dx > 0 ? 1 : -1;
      facing = dir;
      x += dir * 0.6;
      wrap.classList.add('walking');
    }else{
      wrap.classList.remove('walking');
    }
    wrap.style.left = x + 'px';
    wrap.style.transform = `scaleX(${facing})`;
    requestAnimationFrame(step);
  }
  step();
})();

const DISCORD_ID = "1418597263479144471";
async function loadLanyardProfile(){
  try{
    const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
    const json = await res.json();
    if(json.success){
      const u = json.data.discord_user;
      const ext = u.avatar && u.avatar.startsWith('a_') ? 'gif' : 'png';
      const url = u.avatar
        ? `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.${ext}?size=256`
        : `https://cdn.discordapp.com/embed/avatars/0.png`;
      const img = new Image();
      img.src = url;
      img.alt = "";
      img.onload = ()=>{
        document.getElementById('avatar').innerHTML = '';
        document.getElementById('avatar').appendChild(img);
      };
      const name = u.global_name || u.username || "";
      document.getElementById('displayName').textContent = name;
    }
  }catch(e){}
}

let player, playerReady=false, musicStarted=false, wantsPlay=false;
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

function onYouTubeIframeAPIReady(){
  player = new YT.Player('yt', {
    height:'1', width:'1', videoId:'3SPbIo1ZTu4',
    playerVars:{ autoplay:0, controls:0, loop:1, playlist:'3SPbIo1ZTu4' },
    events:{
      onReady:()=>{
        playerReady = true;
        if(wantsPlay && !musicStarted){
          player.playVideo();
          musicStarted = true;
        }
      }
    }
  });
}

document.getElementById('loader').addEventListener('click', ()=>{
  document.getElementById('loader').classList.add('hidden');
  wantsPlay = true;
  if(playerReady && !musicStarted){
    player.playVideo();
    musicStarted = true;
  }
});

window.addEventListener('load', ()=>{
  loadLanyardProfile();
});
</script>
