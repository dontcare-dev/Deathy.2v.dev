<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deathy — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080808;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --text: #f0f0f0;
    --muted: #777;
    --accent: #ffffff;
    --glow: rgba(255,255,255,0.06);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px;
    position: relative;
  }

  /* ── REPEATING VIDEO BACKGROUND ── */
  .video-bg-grid {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    grid-template-rows: repeat(auto-fill, minmax(300px, 1fr));
    overflow: hidden;
    pointer-events: none;
  }
  
  .video-bg-grid video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.15;
    mix-blend-mode: screen;
  }

  /* Dark overlay for readability */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 50% 0%, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.85) 70%),
      linear-gradient(to bottom, rgba(10,10,10,0.9), rgba(10,10,10,0.95));
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    width: 100%;
    max-width: 900px;
    position: relative;
    z-index: 1;
  }

  /* ── BANNER ── */
  .banner {
    width: 100%;
    height: 220px;
    border-radius: 12px 12px 0 0;
    overflow: hidden;
    position: relative;
    background: #000;
  }
  .banner video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.85;
  }
  .banner-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(8,8,8,0.95) 100%);
  }

  /* ── PROFILE HEADER ── */
  .profile-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 0 28px 24px;
    position: relative;
    display: flex;
    align-items: flex-end;
    gap: 20px;
  }

  .avatar-wrap {
    position: relative;
    margin-top: -44px;
    flex-shrink: 0;
  }
  .avatar-wrap img {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 3px solid var(--bg);
    object-fit: cover;
    display: block;
    background: #222;
  }
  .status-dot {
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    background: #3d3d3d;
    transition: background 0.4s;
  }
  .status-dot.online  { background: #57f287; }
  .status-dot.idle    { background: #fee75c; }
  .status-dot.dnd     { background: #ed4245; }
  .status-dot.offline { background: #5c5c5c; }

  .profile-info {
    flex: 1;
    padding-top: 18px;
  }
  .profile-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .profile-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .flag { font-size: 14px; }

  /* ── MAIN GRID ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 12px;
    margin-top: 12px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .card-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ── SPOTIFY CARD ── */
  .spotify-card { }
  .spotify-inner {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .spotify-art {
    width: 60px;
    height: 60px;
    border-radius: 6px;
    background: var(--surface2);
    flex-shrink: 0;
    object-fit: cover;
  }
  .spotify-meta { flex: 1; min-width: 0; }
  .spotify-track {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .spotify-artist {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .spotify-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }
  .spotify-progress {
    height: 100%;
    background: #fff;
    border-radius: 2px;
    width: 0%;
    transition: width 1s linear;
  }
  .spotify-icon {
    flex-shrink: 0;
  }
  .spotify-not-playing {
    color: var(--muted);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── SOCIALS ── */
  .socials-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .social-item {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text);
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    transition: border-color 0.2s, background 0.2s;
  }
  .social-item:hover {
    border-color: #444;
    background: #222;
  }
  .social-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    fill: var(--muted);
  }
  .social-label { font-size: 11px; color: var(--muted); }
  .social-value { font-size: 13px; font-weight: 500; }
  .social-text { display: flex; flex-direction: column; gap: 1px; }

  /* ── ONLINE INDICATOR ── */
  .online-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #57f287;
    font-weight: 500;
    margin-bottom: 14px;
  }
  .online-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #57f287;
  }

  /* ── ACTIVITY ── */
  .activity-list { display: flex; flex-direction: column; gap: 10px; }
  .activity-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: var(--surface2);
    border-radius: 7px;
    border: 1px solid var(--border);
  }
  .activity-img {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    background: #222;
    object-fit: cover;
  }
  .activity-name { font-size: 13px; font-weight: 600; }
  .activity-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .no-activity { font-size: 13px; color: var(--muted); }

  @media (max-width: 640px) {
    .main-grid { grid-template-columns: 1fr; }
    .banner { height: 140px; }
  }
</style>

<script>
const DISCORD_ID = '1418597263479144471';
const LANYARD_URL = `https://api.lanyard.rest/v1/users/${DISCORD_ID}`;
const BG_VIDEO_URL = 'https://files.catbox.moe/ptc92a.mp4';

let spotifyInterval = null;
let spotifyStart = null;
let spotifyDuration = null;

// ── GENERATE REPEATING VIDEO BACKGROUND ──
function createVideoBackground() {
  const grid = document.getElementById('videoBgGrid');
  const cols = Math.ceil(window.innerWidth / 300);
  const rows = Math.ceil(window.innerHeight / 300);
  const totalVideos = cols * rows;
  
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  
  for (let i = 0; i < totalVideos; i++) {
    const video = document.createElement('video');
    video.src = BG_VIDEO_URL;
    video.autoplay = true;
    video.muted = true;
    video.loop = true;
    video.playsinline = true;
    grid.appendChild(video);
  }
}

// Initialize background
createVideoBackground();

// Regenerate on window resize
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(createVideoBackground, 250);
});

function updateSpotify(data) {
  const el = document.getElementById('spotify-content');
  if (data.listening_to_spotify && data.spotify) {
    const sp = data.spotify;
    spotifyStart = sp.timestamps?.start || Date.now();
    spotifyDuration = (sp.timestamps?.end || (Date.now() + 200000)) - spotifyStart;
    clearInterval(spotifyInterval);

    el.innerHTML = `
      <div class="spotify-inner">
        <img class="spotify-art" src="${sp.album_art_url || ''}" alt="art" />
        <div class="spotify-meta">
          <div class="spotify-track">${sp.song}</div>
          <div class="spotify-artist">${sp.artist}</div>
          <div class="spotify-bar"><div class="spotify-progress" id="sp-prog"></div></div>
        </div>
        <a href="https://open.spotify.com/track/${sp.track_id}" target="_blank" rel="noopener" class="spotify-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#aaa"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        </a>
      </div>`;

    spotifyInterval = setInterval(() => {
      const prog = document.getElementById('sp-prog');
      if (!prog) { clearInterval(spotifyInterval); return; }
      const pct = Math.min(((Date.now() - spotifyStart) / spotifyDuration) * 100, 100);
      prog.style.width = pct + '%';
    }, 1000);
  } else {
    clearInterval(spotifyInterval);
    el.innerHTML = `
      <div class="spotify-not-playing">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#555"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        Not playing anything right now
      </div>`;
  }
}

function updateStatus(status) {
  const dot = document.getElementById('status-dot');
  const badge = document.getElementById('online-badge');
  dot.className = 'status-dot ' + status;
  const labels = { online: ['#57f287','Online'], idle: ['#fee75c','Idle'], dnd: ['#ed4245','Do Not Disturb'], offline: ['#5c5c5c','Offline'] };
  const [color, label] = labels[status] || ['#5c5c5c','Offline'];
  badge.querySelector('.online-dot').style.background = color;
  badge.querySelector('span').style.color = color;
  badge.querySelector('span').textContent = label;
}

function updateActivities(activities) {
  const el = document.getElementById('activity-content');
  const filtered = (activities || []).filter(a => a.type === 0 || a.type === 1 || a.type === 2);
  if (!filtered.length) { el.innerHTML = '<div class="no-activity">No activity detected</div>'; return; }
  el.innerHTML = filtered.map(a => {
    const img = a.assets?.large_image
      ? `https://cdn.discordapp.com/app-assets/${a.application_id}/${a.assets.large_image}.png`
      : '';
    return `<div class="activity-item">
      ${img ? `<img class="activity-img" src="${img}" alt="" onerror="this.style.display='none'" />` : '<div class="activity-img"></div>'}
      <div>
        <div class="activity-name">${a.name}</div>
        <div class="activity-detail">${a.details || a.state || ''}</div>
      </div>
    </div>`;
  }).join('');
}

async function fetchLanyard() {
  try {
    const res = await fetch(LANYARD_URL);
    const json = await res.json();
    if (!json.success) return;
    const d = json.data;

    // Avatar
    const avatarEl = document.getElementById('avatar');
    if (d.discord_user) {
      const user = d.discord_user;
      const avatarHash = user.avatar;
      if (avatarHash) {
        const ext = avatarHash.startsWith('a_') ? 'gif' : 'png';
        avatarEl.src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${avatarHash}.${ext}?size=128`;
      }
      document.getElementById('display-name').textContent = user.global_name || user.username || 'Deathy';
      document.getElementById('discord-tag').textContent = user.username || '';
      document.getElementById('discord-name').textContent = user.global_name || user.username || 'deathy.dev';
    }

    updateStatus(d.discord_status || 'offline');
    updateSpotify(d);
    updateActivities(d.activities);
  } catch(e) {
    console.warn('Lanyard fetch failed', e);
  }
}

fetchLanyard();
setInterval(fetchLanyard, 15000);
</script>
