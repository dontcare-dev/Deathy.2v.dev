<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050509;
    --ink:#e9e9f2;
    --dim:#8a8a9c;
    --accent-blue:#4f7fe0;
    --accent-amber:#e0a458;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    color:var(--ink);
    font-family:'Space Grotesk',sans-serif;
    overflow:hidden;
  }

  /* ================= GLASS BLUR LOADER ================= */
  #loader{
    position:fixed;
    inset:0;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:opacity .6s ease, visibility .6s ease;
    overflow:hidden;
    background:
      radial-gradient(ellipse 70% 55% at 30% 20%, rgba(120,150,255,0.35), transparent 60%),
      radial-gradient(ellipse 65% 50% at 80% 30%, rgba(80,110,230,0.30), transparent 60%),
      radial-gradient(ellipse 75% 55% at 50% 85%, rgba(140,170,255,0.25), transparent 60%),
      linear-gradient(160deg,#0a0e1e,#03040a 70%);
  }
  #loader.hidden{ opacity:0; visibility:hidden; pointer-events:none; }
  #loader::before, #loader::after{
    content:'';
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
  }
  #loader::before{
    width:60vmax; height:60vmax;
    top:-15vmax; left:-15vmax;
    background:radial-gradient(circle, rgba(120,160,255,0.35), transparent 70%);
    animation: blob1 14s ease-in-out infinite alternate;
  }
  #loader::after{
    width:55vmax; height:55vmax;
    bottom:-18vmax; right:-12vmax;
    background:radial-gradient(circle, rgba(70,100,220,0.35), transparent 70%);
    animation: blob2 17s ease-in-out infinite alternate;
  }
  @keyframes blob1{ to{ transform:translate(6vmax,8vmax) scale(1.15); } }
  @keyframes blob2{ to{ transform:translate(-6vmax,-6vmax) scale(1.2); } }

  .glass-panel{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    padding:46px 52px;
    border-radius:28px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.22);
    backdrop-filter:blur(40px) saturate(160%);
    -webkit-backdrop-filter:blur(40px) saturate(160%);
    box-shadow:
      0 8px 40px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.25),
      inset 0 0 60px rgba(120,150,255,0.08);
    opacity:0;
    animation:panelIn 0.8s cubic-bezier(.2,.8,.2,1) 0.1s forwards;
  }
  @keyframes panelIn{
    from{ opacity:0; transform:translateY(10px) scale(0.97); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  .glass-ring{
    width:52px;
    height:52px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.3);
    backdrop-filter:blur(10px);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .glass-ring svg{ width:22px; height:22px; stroke:#eaf1ff; fill:none; stroke-width:1.6; }
  .glass-title{
    font-family:'JetBrains Mono',monospace;
    font-size:0.78rem;
    letter-spacing:3px;
    text-transform:uppercase;
    color:rgba(230,238,255,0.85);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .glass-title span.dot{
    width:5px; height:5px; border-radius:50%;
    background:var(--accent-blue);
    box-shadow:0 0 10px rgba(120,160,255,0.9);
    animation:pulseDot 1.4s ease-in-out infinite;
  }
  @keyframes pulseDot{ 0%,100%{opacity:0.25;} 50%{opacity:1;} }
  /* ======================================================= */

  /* ================= MAIN PAGE (video + card) ================= */
  main{
    position:fixed;
    inset:0;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 20px 28px;
    text-align:center;
    overflow:hidden;
    background:#000;
  }
  #bgVideo{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
  }
  main::after{
    content:'';
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:radial-gradient(ellipse 85% 65% at 50% 45%, transparent 30%, rgba(0,0,0,0.7) 100%);
  }
  .avatar-wrap{
    position:relative;
    z-index:2;
    width:108px;
    height:108px;
    margin-bottom:16px;
  }
  .avatar{
    width:100%;
    height:100%;
    border-radius:50%;
    background:linear-gradient(160deg,#23233a,#0c0c16);
    border:2px solid rgba(255,255,255,0.14);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 30px rgba(90,110,220,0.28);
    overflow:hidden;
  }
  .avatar svg{ width:44px; height:44px; stroke:var(--dim); }
  .avatar img{ width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .status-dot{
    position:absolute;
    right:4px;
    bottom:4px;
    width:18px;
    height:18px;
    border-radius:50%;
    background:var(--accent-blue);
    border:3px solid var(--bg);
    box-shadow:0 0 8px rgba(79,127,224,0.8);
  }
  .name{
    position:relative;
    z-index:2;
    font-size:1.8rem;
    font-weight:700;
    letter-spacing:0.5px;
    margin:0 0 10px;
  }
  .status-line{
    position:relative;
    z-index:2;
    font-family:'JetBrains Mono',monospace;
    font-size:0.9rem;
    color:var(--dim);
    margin-bottom:26px;
    display:flex;
    align-items:center;
    gap:2px;
  }
  .caret{
    display:inline-block;
    width:2px;
    height:1.1em;
    background:var(--accent-amber);
    margin-left:4px;
    animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }
  .social-row{
    position:relative;
    z-index:2;
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:10px;
  }
  .social-link{
    width:34px;
    height:34px;
    border-radius:10px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.14);
    backdrop-filter:blur(4px);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    text-decoration:none;
    position:relative;
    transition:background .2s ease, transform .15s ease;
  }
  .social-link:hover{ background:rgba(255,255,255,0.12); transform:translateY(-2px); }
  .social-link svg{ width:18px; height:18px; }
  #yt{
    position:fixed;
    width:1px;
    height:1px;
    opacity:0;
    pointer-events:none;
  }
  @media (max-width:400px){
    .name{ font-size:1.6rem; }
    .avatar-wrap{ width:92px; height:92px; }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="glass-panel">
    <div class="glass-ring">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 12a4 4 0 100-8 4 4 0 000 8zM4 20c0-3.6 3.6-6 8-6s8 2.4 8 6"/></svg>
    </div>
    <div class="glass-title"><span class="dot"></span>click to enter</div>
  </div>
</div>

<main>
  <video id="bgVideo" muted playsinline autoplay preload="auto" loop src="https://files.catbox.moe/lv3hfn.mp4"></video>

  <div class="avatar-wrap">
    <div class="avatar" id="avatar">
      <svg viewBox="0 0 24 24" fill="none"><path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M12 12a4 4 0 100-8 4 4 0 000 8zM4 20c0-3.6 3.6-6 8-6s8 2.4 8 6"/></svg>
    </div>
    <div class="status-dot"></div>
  </div>

  <h1 class="name" id="displayName">&nbsp;</h1>

  <div class="status-line">yo<span class="caret"></span></div>

  <div class="social-row">
    <a class="social-link" href="https://discord.com/users/1418597263479144471" target="_blank" rel="noopener" title="Discord">
      <svg viewBox="0 0 127.14 96.36"><path fill="#5865F2" d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
    </a>
    <a class="social-link" href="https://vt.tiktok.com/ZSCWdoVUH/" target="_blank" rel="noopener" title="TikTok">
      <svg viewBox="0 0 48 48">
        <path fill="#25F4EE" d="M33.5 12.9c-2.6-1.7-4.3-4.6-4.6-7.9h-5.8v27.1c0 3.3-2.7 6-6 6s-6-2.7-6-6 2.7-6 6-6c.6 0 1.1.1 1.7.3v-5.9c-.6-.1-1.1-.1-1.7-.1-6.6 0-12 5.4-12 12s5.4 12 12 12 12-5.4 12-12V18.4c2.5 1.8 5.6 2.9 8.9 2.9v-5.8c-1.6 0-3.1-.4-4.5-1.2z" transform="translate(-1,-1)"/>
        <path fill="#FE2C55" d="M33.5 12.9c-2.6-1.7-4.3-4.6-4.6-7.9h-5.8v27.1c0 3.3-2.7 6-6 6s-6-2.7-6-6 2.7-6 6-6c.6 0 1.1.1 1.7.3v-5.9c-.6-.1-1.1-.1-1.7-.1-6.6 0-12 5.4-12 12s5.4 12 12 12 12-5.4 12-12V18.4c2.5 1.8 5.6 2.9 8.9 2.9v-5.8c-1.6 0-3.1-.4-4.5-1.2z" transform="translate(1,1)"/>
        <path fill="#000000" d="M33.5 12.9c-2.6-1.7-4.3-4.6-4.6-7.9h-5.8v27.1c0 3.3-2.7 6-6 6s-6-2.7-6-6 2.7-6 6-6c.6 0 1.1.1 1.7.3v-5.9c-.6-.1-1.1-.1-1.7-.1-6.6 0-12 5.4-12 12s5.4 12 12 12 12-5.4 12-12V18.4c2.5 1.8 5.6 2.9 8.9 2.9v-5.8c-1.6 0-3.1-.4-4.5-1.2z"/>
      </svg>
    </a>
  </div>
</main>

<div id="yt"></div>

<script>
const DISCORD_ID = "1418597263479144471";
async function loadLanyardProfile(){
  try{
    const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
    const json = await res.json();
    if(json.success){
      const u = json.data.discord_user;
      const ext = u.avatar && u.avatar.startsWith('a_') ? 'gif' : 'png';
      const url = u.avatar
        ? `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.${ext}?size=256`
        : `https://cdn.discordapp.com/embed/avatars/0.png`;
      const img = new Image();
      img.src = url;
      img.alt = "";
      img.onload = ()=>{
        document.getElementById('avatar').innerHTML = '';
        document.getElementById('avatar').appendChild(img);
      };
      const name = u.global_name || u.username || "";
      document.getElementById('displayName').textContent = name;
    }
  }catch(e){}
}

let player, playerReady=false, musicStarted=false, wantsPlay=false;
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

function onYouTubeIframeAPIReady(){
  player = new YT.Player('yt', {
    height:'1', width:'1', videoId:'3SPbIo1ZTu4',
    playerVars:{ autoplay:0, controls:0, loop:1, playlist:'3SPbIo1ZTu4' },
    events:{
      onReady:()=>{
        playerReady = true;
        if(wantsPlay && !musicStarted){
          player.playVideo();
          musicStarted = true;
        }
      }
    }
  });
}

/* ---------- GLASS GATE: tap to enter ---------- */
const loaderEl = document.getElementById('loader');
let handedOff = false;

function handoff(){
  if(handedOff) return;
  handedOff = true;
  loaderEl.classList.add('hidden');
  wantsPlay = true;
  if(playerReady && !musicStarted){
    player.playVideo();
    musicStarted = true;
  }
}

loaderEl.addEventListener('click', handoff);

window.addEventListener('load', ()=>{
  loadLanyardProfile();
});
</script>
</body>
</html>
